<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام RUG الاحترافي - الإصدار السحابي النهائي V14.0</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- تحميل مكتبات Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary-gold: #ffcc00;
            --secondary-gold: #d4af37;
            --dark-bg: #050506;
            --card-bg: rgba(15, 15, 20, 0.98);
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --success: #00ff88;
            --error: #ff3e3e;
            --text: #ffffff;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 5% 5%, rgba(188, 19, 254, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 95% 95%, rgba(0, 242, 255, 0.15) 0%, transparent 35%);
            background-attachment: fixed;
        }

        /* شاشة تسجيل الدخول الاحترافية */
        #auth-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(25px);
        }

        .auth-container {
            width: 90%;
            max-width: 450px;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 30px;
            border: 2px solid var(--primary-gold);
            box-shadow: 0 0 70px rgba(255, 204, 0, 0.3);
            text-align: center;
        }

        .auth-input {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            text-align: center;
            transition: 0.3s;
        }

        .auth-input:focus { border-color: var(--neon-blue); background: rgba(255,255,255,0.08); }

        .auth-btn {
            width: 100%;
            padding: 18px;
            margin-top: 20px;
            background: linear-gradient(45deg, var(--primary-gold), var(--secondary-gold));
            border: none;
            border-radius: 15px;
            font-weight: 900;
            cursor: pointer;
            transition: var(--transition);
            color: #000;
            font-size: 1.2rem;
        }

        .auth-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--primary-gold); }

        /* واجهة اللعبة الاحترافية */
        header {
            padding: 40px;
            text-align: center;
            background: linear-gradient(to bottom, #000, transparent);
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 6vw, 3.5rem);
            background: linear-gradient(45deg, var(--primary-gold), #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255, 204, 0, 0.5);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        @media (min-width: 768px) { .stats-bar { grid-template-columns: repeat(4, 1fr); } }

        .stat-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            border-bottom: 5px solid var(--primary-gold);
        }

        .stat-label { font-size: 0.9rem; color: var(--secondary-gold); margin-bottom: 5px; display: block; }
        .stat-val { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; color: var(--neon-blue); }

        .game-main {
            max-width: 1000px;
            margin: 0 auto 60px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        .img-viewport {
            width: 100%;
            height: clamp(300px, 55vh, 550px);
            border-radius: 35px;
            overflow: hidden;
            border: 6px solid #1a1a1e;
            position: relative;
            background: #000;
        }

        #active-img { width: 100%; height: 100%; object-fit: cover; transition: 0.7s ease; opacity: 0; }

        .blur-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(0px); transition: 0.7s; pointer-events: none;
        }

        .choices-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        @media (min-width: 500px) { .choices-grid { grid-template-columns: repeat(2, 1fr); } }

        .btn-choice {
            padding: 25px;
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            color: white;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-choice:hover { border-color: var(--primary-gold); transform: translateY(-8px); background: rgba(255,204,0,0.1); }
        .btn-choice.correct { background: var(--success) !important; color: #000; border-color: var(--success); box-shadow: 0 0 30px var(--success); }
        .btn-choice.wrong { background: var(--error) !important; border-color: var(--error); box-shadow: 0 0 30px var(--error); }

        .map-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            padding: 20px 40px;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-blue));
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            z-index: 100;
            font-size: 1.2rem;
        }

        #progress-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 95%; max-width: 900px; height: 85%;
            background: var(--card-bg);
            border-radius: 40px; padding: 40px;
            overflow-y: auto; border: 2px solid var(--neon-blue);
        }

        .level-node-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 15px; margin-top: 30px;
        }

        .node {
            aspect-ratio: 1; background: #151518;
            border-radius: 15px; display: flex;
            justify-content: center; align-items: center;
            font-weight: bold; font-family: 'Orbitron';
            border: 1px solid rgba(255,255,255,0.08);
            transition: 0.3s;
        }

        .node.completed { background: var(--success); color: #000; border-color: var(--success); }
        .node.current { background: var(--neon-blue); color: #000; box-shadow: 0 0 25px var(--neon-blue); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .overlay-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10001; display: flex; flex-direction: column; justify-content: center; align-items: center; }

    </style>
</head>
<body>

    <div id="overlay-loader" class="overlay-loader">
        <h1 class="main-title">جاري مزامنة RUG Cloud...</h1>
    </div>

    <div id="auth-screen">
        <div class="auth-container">
            <h2 class="main-title" style="font-size: 2.5rem; margin-bottom: 30px;">دخول النظام</h2>
            <input type="email" id="auth-email" class="auth-input" placeholder="البريد الإلكتروني">
            <input type="password" id="auth-password" class="auth-input" placeholder="كلمة المرور">
            <button class="auth-btn" onclick="handleAuth('login')">تسجيل الدخول</button>
            <button class="auth-btn" onclick="handleAuth('signup')" style="background: transparent; border: 1px solid var(--primary-gold); color: var(--primary-gold); margin-top: 15px;">إنشاء حساب جديد</button>
            <p id="auth-error" style="color: var(--error); margin-top: 20px; font-size: 1rem; font-weight: bold; line-height: 1.5;"></p>
        </div>
    </div>

    <header>
        <h1 class="main-title">نظام الـ 90 مستوى السحابي</h1>
        <div style="margin-top: 15px; color: var(--secondary-gold); font-weight: bold; letter-spacing: 1px;" id="display-user">جاري التحقق...</div>
    </header>

    <div class="stats-bar">
        <div class="stat-box"><span class="stat-label">المستوى الحالي</span><div class="stat-val" id="ui-lvl">1</div></div>
        <div class="stat-box"><span class="stat-label">المراحل المنجزة</span><div class="stat-val" id="ui-prog">0/90</div></div>
        <div class="stat-box"><span class="stat-label">إجمالي النقاط</span><div class="stat-val" id="ui-pts">0</div></div>
        <div class="stat-box"><button onclick="firebase.auth().signOut()" style="background: var(--error); border: none; color: #fff; padding: 15px; border-radius: 15px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem;">خروج آمن</button></div>
    </div>

    <main class="game-main">
        <div class="img-viewport">
            <img src="" id="active-img">
            <div class="blur-layer" id="active-blur"></div>
        </div>
        <div class="choices-grid" id="choices-box"></div>
    </main>

    <button class="map-btn" onclick="toggleProgressMap(true)">خريطة الـ 90 مستوى 🗺️</button>

    <div id="progress-modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 class="main-title" style="font-size: 1.8rem;">مسار التقدم الاحترافي</h2>
                <button onclick="toggleProgressMap(false)" style="background: none; border: none; color: white; font-size: 3rem; cursor: pointer;">&times;</button>
            </div>
            <div class="level-node-grid" id="map-node-container"></div>
        </div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بمشروع RUG - تم تحديثها بدقة من صورتك الأخيرة
        const firebaseConfig = {
            apiKey: "AIzaSyAc6n3o8iYY51IKGtQ90-zdDJfmwx0RgrM",
            authDomain: "yoyo020118.firebaseapp.com",
            databaseURL: "https://yoyo020118-default-rtdb.firebaseio.com",
            projectId: "yoyo020118",
            storageBucket: "yoyo020118.firebasestorage.app",
            messagingSenderId: "285530131606",
            appId: "1:285530131606:web:79e6fdf7cc874da82686b7",
            measurementId: "G-RM13QTMF8B"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let userData = { level: 1, score: 0, completed: 0 };
        const maxLevels = 90;
        const categories = [
            { n: "تكنولوجيا", k: "robotics,coding" }, { n: "مدن", k: "skyscrapers,urban" },
            { n: "غابات", k: "rainforest,wild" }, { n: "جبال", k: "summit,glacier" },
            { n: "فضاء", k: "nebula,astronaut" }, { n: "سيارات", k: "drift,racing" },
            { n: "بحار", k: "coral,ocean" }, { n: "حيوانات", k: "predator,wild" }
        ];

        // مراقبة حالة اللاعب
        auth.onAuthStateChanged(user => {
            document.getElementById('overlay-loader').style.display = 'none';
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('display-user').innerText = `المستخدم النشط: ${user.email}`;
                syncData(user.uid);
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('display-user').innerText = "بانتظار تسجيل الدخول...";
            }
        });

        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-password').value.trim();
            const err = document.getElementById('auth-error');
            
            if(!email || !pass) { err.innerText = "يرجى تعبئة كافة الحقول"; return; }
            err.innerText = "جاري معالجة الطلب...";

            try {
                if (type === 'signup') await auth.createUserWithEmailAndPassword(email, pass);
                else await auth.signInWithEmailAndPassword(email, pass);
            } catch (e) { 
                err.innerText = "تنبيه: " + e.message; 
            }
        }

        function syncData(uid) {
            db.ref('users/' + uid).on('value', snap => {
                if (snap.exists()) userData = snap.val();
                else saveCloud();
                updateUI();
                renderLevel();
            });
        }

        function saveCloud() {
            const user = auth.currentUser;
            if (user) db.ref('users/' + user.uid).update(userData);
        }

        function renderLevel() {
            const current = categories[(userData.level - 1) % categories.length];
            const img = document.getElementById('active-img');
            const box = document.getElementById('choices-box');

            img.style.opacity = '0';
            img.src = `https://loremflickr.com/800/600/${current.k}?lock=${userData.level}`;
            img.onload = () => img.style.opacity = '1';

            // تزداد الصعوبة (التغبيش) مع كل مستوى
            let blurIntensity = (userData.level / maxLevels) * 16;
            document.getElementById('active-blur').style.backdropFilter = `blur(${blurIntensity}px)`;

            box.innerHTML = '';
            let opts = [current.n];
            while(opts.length < 4) {
                let r = categories[Math.floor(Math.random()*categories.length)].n;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5).forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn-choice';
                b.innerText = o;
                b.onclick = () => {
                    if(o === current.n) {
                        b.classList.add('correct');
                        userData.score += (userData.level * 30);
                        userData.completed = Math.max(userData.completed, userData.level);
                        userData.level++;
                        if(userData.level > maxLevels) {
                            alert("أسطورة! لقد ختمت الـ 90 مستوى!");
                            userData.level = 1;
                        }
                        setTimeout(saveCloud, 700);
                    } else {
                        b.classList.add('wrong');
                        userData.score = Math.max(0, userData.score - 15);
                        setTimeout(() => b.classList.remove('wrong'), 500);
                    }
                };
                box.appendChild(b);
            });
        }

        function updateUI() {
            document.getElementById('ui-lvl').innerText = userData.level;
            document.getElementById('ui-pts').innerText = userData.score.toLocaleString();
            document.getElementById('ui-prog').innerText = `${userData.completed}/${maxLevels}`;
        }

        function toggleProgressMap(show) {
            const modal = document.getElementById('progress-modal');
            modal.style.display = show ? 'flex' : 'none';
            if (show) {
                const grid = document.getElementById('map-node-container');
                grid.innerHTML = '';
                for (let i = 1; i <= maxLevels; i++) {
                    const n = document.createElement('div');
                    n.className = 'node';
                    if (i <= userData.completed) n.classList.add('completed');
                    if (i === userData.level) n.classList.add('current');
                    n.innerText = i;
                    grid.appendChild(n);
                }
            }
        }
    </script>
</body>
</html>
